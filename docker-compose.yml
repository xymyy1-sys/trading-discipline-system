services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:///./data/trading_discipline.db
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?Set AUTH_PASSWORD to at least 12 characters}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET to at least 32 random characters}
      DEMO_USERNAME: ${DEMO_USERNAME:-demo}
      DEMO_PASSWORD: ${DEMO_PASSWORD:-}
      DEMO_DATABASE_URL: sqlite:///./data/demo_discipline.db
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:5173","http://127.0.0.1:5173"]}
      AUDIT_ENABLED: ${AUDIT_ENABLED:-true}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-sol}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      DINGTALK_ENABLED: ${DINGTALK_ENABLED:-false}
      DINGTALK_WEBHOOK: ${DINGTALK_WEBHOOK:-}
      DINGTALK_SECRET: ${DINGTALK_SECRET:-}
      HTTP_PROXY: ${OUTBOUND_HTTP_PROXY:-}
      HTTPS_PROXY: ${OUTBOUND_HTTP_PROXY:-}
      NO_PROXY: localhost,127.0.0.1,backend,frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "${BACKEND_DATA_PATH:-backend-data}:/app/data"
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: .
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_BIND_ADDRESS:-127.0.0.1}:5173:80"
    restart: unless-stopped

volumes:
  backend-data:
