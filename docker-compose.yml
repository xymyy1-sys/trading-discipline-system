services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:///./data/trading_discipline.db
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?Set AUTH_PASSWORD to at least 12 characters}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET to at least 32 random characters}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    volumes:
      - backend-data:/app/data
    expose:
      - "8000"

  frontend:
    build:
      context: .
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  backend-data:
