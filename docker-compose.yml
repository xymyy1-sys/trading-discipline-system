services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: sqlite:///./data/trading_discipline.db
    volumes:
      - backend-data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  backend-data:
